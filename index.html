<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game">
        <div class="topbar" aria-live="polite">
          <div>
            <p class="eyebrow">Juego clásico</p>
            <h1>Snake</h1>
          </div>
          <div class="scores">
            <div>
              <span>Puntos</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span>Récord</span>
              <strong id="best">0</strong>
            </div>
          </div>
        </div>

        <div class="board-wrap">
          <canvas id="board" width="520" height="520" aria-label="Tablero de Snake"></canvas>
          <div class="overlay" id="overlay">
            <h2 id="overlayTitle">Listo para jugar</h2>
            <p id="overlayText">Presiona espacio o toca iniciar.</p>
            <button class="primary" id="startBtn" type="button">Iniciar</button>
          </div>
        </div>

        <div class="controls">
          <div class="action-row">
            <button id="pauseBtn" type="button" aria-label="Pausar o continuar">Pausa</button>
            <label class="select-label" for="speedSelect">
              Velocidad
              <select id="speedSelect">
                <option value="150">Suave</option>
                <option value="115" selected>Normal</option>
                <option value="85">Rápida</option>
              </select>
            </label>
            <label class="select-label" for="modeSelect">
              Modo
              <select id="modeSelect">
                <option value="classic" selected>Clásico</option>
                <option value="wrap">Sin paredes</option>
                <option value="portal">Portales</option>
                <option value="obstacles">Obstáculos</option>
              </select>
            </label>
            <label class="select-label" for="foodSelect">
              Manzana
              <select id="foodSelect">
                <option value="normal" selected>Normal</option>
                <option value="golden">Dorada</option>
                <option value="mystery">Sorpresa</option>
              </select>
            </label>
            <label class="select-label range-label" for="foodCount">
              <span>Cantidad: <strong id="foodCountValue">1</strong></span>
              <input id="foodCount" type="range" min="1" max="650" value="1" />
            </label>
          </div>

          <div class="pad" aria-label="Controles de dirección">
            <button data-dir="up" type="button" aria-label="Arriba">↑</button>
            <button data-dir="left" type="button" aria-label="Izquierda">←</button>
            <button data-dir="down" type="button" aria-label="Abajo">↓</button>
            <button data-dir="right" type="button" aria-label="Derecha">→</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
